#    org.talk.is.cheap.project.free.flow.scheduler.cluster.client.WorkerClusterClient: DEBUG
spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss  # 设置日期格式
    time-zone: GMT+8                  # 设置时区 (重要，否则可能差8小时)
  application:
    name: free-flow-scheduler
    env-type: host
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/free_flow_scheduler?characterEncoding=utf8&serverTimezone=UTC
      username: root
      password: root

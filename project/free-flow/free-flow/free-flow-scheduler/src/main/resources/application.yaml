# MyBatis 配置
mybatis:
  mapper-locations: classpath:mappers/**/*.xml  # XML 映射文件路径
  type-aliases-package: org.talk.is.cheap.project.free.flow.scheduler.repository.domain.pojo # 实体类别名包路径
  configuration:
    map-underscore-to-camel-case: true  # 驼峰命名映射
    logPrefix: mybatis

# todo: 公共配置可以统一管理
# zookeeper配置
apache:
  zookeeper:
    # 服务器连接地址，集群模式则使用逗号分隔如：ip1:host,ip2:host
    connect-url: 127.0.0.1:2181
    # 会话超时时间：单位ms
    session-timeout: 30000
    # 连接超时时间：单位ms
    connection-timeout: 10000
    # ACL权限控制，验证策略
    scheme: digest
    # 验证内容id，用于访问zk根路径的访问认证
    zk-auth-id: admin:123456
    # 管理zk中所用到的路径
    path:
      scheduler:
        root: /free-flow/scheduler
        election: /free-flow/scheduler/election
        runnable: /free-flow/scheduler/runnable
      worker:
        root: /free-flow/worker
        online: /free-flow/worker/online
        runnable: /free-flow/worker/runnable
        terminating: /free-flow/worker/terminating
  # 重试策略
  retry-policy:
    # 初始化间隔时间
    base-sleep-time: 1000
    # 最大重试次数
    max-retries: 5
    # 最大重试间隔时间
    max-sleep: 30000



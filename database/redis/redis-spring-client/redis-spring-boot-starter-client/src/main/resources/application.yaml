spring:
  application:
    name: redis-spring-client  # 应用名称
#    额。。。其实是瞎试出来的，spring3的配置文件得写在spring.data.redis下，否则不生效
#  20251220更新说明：自动装配说明：spring-redis的自动配置实际上是在spring-boot-autoconfigure这个包里的org.springframework.boot.autoconfigure.data.redis的RedisAutoConfiguration这个类里，所依赖的bean包括
# 1. RedisProperties properties：这个就是yaml里的配置内容的对象
# 2. RedisConnectionFactory redisConnectionFactory：这个链接工厂的自动装配的关键代码在LettuceConnectionConfiguration中，关键其实就是创建了一个DefaultClientResources lettuceClientResources和LettuceConnectionFactory redisConnectionFactory，关于几个入参，都是叫做一个叫Customizer的东西，就是开放给开发者做变更用的；而LettuceConnectionFactory需要LettuceClientConfiguration
#
  data:
    redis:
      host: localhost             # Redis服务器地址
      port: 6379            # Redis服务器连接端口
      password: 123456      # Redis服务器连接密码（默认为空）
      database: 0           # Redis数据库索引（默认为0）
      timeout: 60s          # 连接空闲超过N(s秒、ms毫秒)后关闭，0为禁用，这里配置值和tcp-keepalive值一致
      # 默认使用 lettuce 连接池
#      关于连接池的配置，可以参考LettuceConnectionConfiguration中调用的getProperties().getLettuce().getPool()
#      里面也有一个isPoolEnabled(pool)方法，这里就是判断连接池的包在不在
#      在redis里通过redis-cli INFO clients查看连接数
#      127.0.0.1:6379> INFO clients
      ## Clients
      #connected_clients:9
      lettuce:
        pool:
          max-active: 32  # 允许最大连接数，默认8（负值表示没有限制），订正，通过查看GenericObjectPoolConfig源码，但实际对应的是maxTotal变量
          max-idle: 16     # 最大空闲连接数，默认8
          min-idle: 8     # 最小空闲连接数，默认0
          max-wait: 5s    # 连接用完时，新的请求等待时间(s秒、ms毫秒)，超过该时间抛出异常JedisConnectionException，(默认-1，负值表示没有限制)
          #time-between-eviction-runs: 1s
#  推荐连接池参数规则(cpu指核数)：
#  1、max-active：大于cpu * 2，通常为(cpu * 2) + 2
#  2、max-idle：cpu * 2
#  3、min-idle：0
#  4、max-wait：5s(秒)
#  5、time-between-eviction-runs：1s(秒)